<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>OpenJax Web Demo - Embedded Tool Stream</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <header class="chat-top">
        <div class="brand">OpenJax</div>
        <div class="chat-state">active</div>
      </header>

      <section class="chat-main">
        <div class="message-list">
          <article class="message-row role-user">
            <div class="bubble user">你好</div>
          </article>

          <article class="message-row role-assistant">
            <div class="assistant-text">你好！我是 OpenJax，很高兴为你服务。有什么我可以帮你的吗？</div>
          </article>

          <article class="message-row role-assistant">
            <div class="assistant-text">我先执行工具调用，下面是执行步骤（可展开查看命令与输出）：</div>
          </article>

          <article class="message-row role-assistant">
            <div id="step-stream" class="step-stream"></div>
            <p id="assistant-summary" class="assistant-summary hidden"></p>
          </article>
        </div>
      </section>

      <footer class="composer">
        <div class="composer-actions">
          <button class="pill-btn">+ 新建对话</button>
          <button class="pill-btn">≡ 压缩</button>
        </div>
        <div class="composer-box">
          <span class="composer-placeholder">有问题，尽管问</span>
          <button class="send-btn">➤</button>
        </div>
      </footer>
    </main>

    <template id="step-template">
      <section class="step-card">
        <button class="step-head" type="button">
          <span class="step-left">
            <span class="step-icon"></span>
            <span class="step-meta">
              <span class="step-title"></span>
              <span class="step-subline">
                <span class="step-subtitle"></span>
                <span class="step-time"></span>
              </span>
            </span>
          </span>
          <span class="step-right">
            <span class="step-delta"></span>
            <span class="step-action">查看详情</span>
            <span class="step-status"></span>
            <span class="step-chevron">⌄</span>
          </span>
        </button>
        <div class="step-body">
          <div class="step-body-inner">
            <p class="step-desc"></p>
            <pre class="step-code"></pre>
            <div class="step-output-wrap">
              <p class="output-title">output</p>
              <pre class="step-output"></pre>
            </div>
          </div>
        </div>
      </section>
    </template>

    <script type="module" src="./app.js"></script>
  </body>
</html>
