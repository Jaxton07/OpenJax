name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-release:
    name: Build and Upload (${{ matrix.target }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: linux-x86_64
            build_cmd: make build-release-linux
            package_cmd: make package-linux
            artifact_glob: dist/openjax-v*-linux-x86_64.tar.gz
          - os: macos-latest
            target: macos-aarch64
            build_cmd: make build-release-mac
            package_cmd: make package-mac
            artifact_glob: dist/openjax-v*-macos-aarch64.tar.gz
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry and target
        uses: Swatinem/rust-cache@v2

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.27.0

      - name: Build release binaries
        run: ${{ matrix.build_cmd }}

      - name: Build web assets
        run: make build-web-release

      - name: Package release
        run: ${{ matrix.package_cmd }}

      - name: Validate package install
        shell: bash
        run: |
          set -euo pipefail
          TAR_FILE=$(ls ${{ matrix.artifact_glob }} | head -n1)
          tar -xzf "$TAR_FILE" -C dist
          PKG_DIR=$(basename "$TAR_FILE" .tar.gz)
          PREFIX="$RUNNER_TEMP/openjax-install"
          bash "dist/$PKG_DIR/install.sh" --prefix "$PREFIX" --yes
          test -x "$PREFIX/bin/tui_next"
          test -x "$PREFIX/bin/openjaxd"
          test -x "$PREFIX/bin/openjax-gateway"
          test -f "$PREFIX/web/index.html"
          GATEWAY_BIND="127.0.0.1:18765"
          OPENJAX_GATEWAY_BIND="$GATEWAY_BIND" "$PREFIX/bin/openjax-gateway" >/tmp/openjax-gateway.log 2>&1 &
          GATEWAY_PID=$!
          trap 'kill "$GATEWAY_PID" 2>/dev/null || true' EXIT
          for _ in {1..30}; do
            if curl -fsS "http://${GATEWAY_BIND}/healthz" >/dev/null; then
              break
            fi
            sleep 1
          done
          curl -fsS "http://${GATEWAY_BIND}/healthz" >/dev/null
          kill "$GATEWAY_PID" 2>/dev/null || true
          wait "$GATEWAY_PID" 2>/dev/null || true
          trap - EXIT
          bash "dist/$PKG_DIR/uninstall.sh" --prefix "$PREFIX" --yes

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}-release
          path: |
            ${{ matrix.artifact_glob }}
            dist/SHA256SUMS

  publish:
    name: Publish GitHub Release Assets
    runs-on: ubuntu-latest
    needs: [build-release]
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Flatten artifacts
        shell: bash
        run: |
          set -euo pipefail
          while IFS= read -r file; do
            target="dist/$(basename "$file")"
            if [[ "$file" != "$target" ]]; then
              cp "$file" "$target"
            fi
          done < <(find dist -type f -name "*.tar.gz")
          : > dist/SHA256SUMS.raw
          while IFS= read -r file; do
            cat "$file" >> dist/SHA256SUMS.raw
          done < <(find dist -type f -name "SHA256SUMS")
          awk '!seen[$0]++' dist/SHA256SUMS.raw > dist/SHA256SUMS

      - name: Create or update release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/openjax-v*-linux-x86_64.tar.gz
            dist/openjax-v*-macos-aarch64.tar.gz
            dist/SHA256SUMS
