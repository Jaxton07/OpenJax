name: CI

on:
  push:
    branches:
      - main
      - dev
  pull_request:
    branches:
      - main
      - dev

jobs:
  rust:
    name: Rust Build and Test
    if: ${{ github.event_name == 'push' || github.event.pull_request.head.repo.full_name != github.repository }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry and target
        uses: Swatinem/rust-cache@v2

      - name: Build workspace
        run: cargo build --workspace --locked

      - name: Test workspace
        run: cargo test --workspace --locked

  web:
    name: Web Build and Test
    if: ${{ github.event_name == 'push' || github.event.pull_request.head.repo.full_name != github.repository }}
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ui/web
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.27.0

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Test
        run: pnpm test

  package-linux:
    name: Linux Package Install Validation
    if: ${{ github.event_name == 'push' || github.event.pull_request.head.repo.full_name != github.repository }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry and target
        uses: Swatinem/rust-cache@v2

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.27.0

      - name: Build release binaries
        run: make build-release-linux

      - name: Build web assets
        run: make build-web-release

      - name: Package linux tarball
        run: make package-linux

      - name: Install/uninstall smoke test
        run: |
          set -euo pipefail
          TAR_FILE=$(ls dist/openjax-v*-linux-x86_64.tar.gz | head -n1)
          tar -xzf "$TAR_FILE" -C dist
          PKG_DIR=$(basename "$TAR_FILE" .tar.gz)
          PREFIX="$RUNNER_TEMP/openjax-install"
          bash "dist/$PKG_DIR/install.sh" --prefix "$PREFIX" --yes
          test -x "$PREFIX/bin/tui_next"
          test -x "$PREFIX/bin/openjaxd"
          test -x "$PREFIX/bin/openjax-gateway"
          test -f "$PREFIX/web/index.html"
          "$PREFIX/bin/openjaxd" --help >/dev/null
          GATEWAY_BIND="127.0.0.1:18765"
          OPENJAX_GATEWAY_BIND="$GATEWAY_BIND" "$PREFIX/bin/openjax-gateway" >/tmp/openjax-gateway.log 2>&1 &
          GATEWAY_PID=$!
          trap 'kill "$GATEWAY_PID" 2>/dev/null || true' EXIT
          HEALTH_OK=0
          for _ in {1..30}; do
            if curl -fsS "http://${GATEWAY_BIND}/healthz" >/dev/null; then
              HEALTH_OK=1
              break
            fi
            sleep 1
          done
          if [[ "$HEALTH_OK" -ne 1 ]]; then
            echo "[smoke] openjax-gateway failed to become healthy in time"
            echo "[smoke] recent openjax-gateway.log:"
            tail -n 200 /tmp/openjax-gateway.log || true
            exit 1
          fi
          kill "$GATEWAY_PID" 2>/dev/null || true
          wait "$GATEWAY_PID" 2>/dev/null || true
          trap - EXIT
          bash "dist/$PKG_DIR/uninstall.sh" --prefix "$PREFIX" --yes
